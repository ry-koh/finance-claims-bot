name: Deploy to Google Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  SERVICE: finance-claims-bot
  CLOUD_RUN_MEMORY: 512Mi
  CLOUD_RUN_CONCURRENCY: 20
  CLOUD_RUN_MAX_INSTANCES: 1

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pytest
          python -m compileall backend/app
          python -m pytest backend/tests

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Write env vars file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GOOGLE_DRIVE_PARENT_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_PARENT_FOLDER_ID }}
          DRIVE_REFRESH_TOKEN: ${{ secrets.DRIVE_REFRESH_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          MINI_APP_URL: ${{ secrets.MINI_APP_URL }}
          APP_URL: ${{ secrets.APP_URL }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          TELEGRAM_WEBHOOK_SECRET_TOKEN: ${{ secrets.TELEGRAM_WEBHOOK_SECRET_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json, os
          keys = [
              'SUPABASE_URL', 'SUPABASE_KEY', 'TELEGRAM_BOT_TOKEN',
              'GOOGLE_SERVICE_ACCOUNT_JSON', 'GMAIL_CLIENT_ID', 'GMAIL_CLIENT_SECRET',
              'GMAIL_REFRESH_TOKEN', 'GOOGLE_DRIVE_PARENT_FOLDER_ID', 'DRIVE_REFRESH_TOKEN',
              'R2_ACCOUNT_ID', 'R2_ACCESS_KEY_ID', 'R2_SECRET_ACCESS_KEY', 'R2_BUCKET_NAME',
              'MINI_APP_URL', 'APP_URL', 'ALLOWED_ORIGINS', 'TELEGRAM_WEBHOOK_SECRET_TOKEN',
          ]
          data = {k: os.environ.get(k, '') for k in keys}
          data['ALLOWED_ORIGINS'] = data.get('ALLOWED_ORIGINS') or data.get('MINI_APP_URL')
          with open('/tmp/env-vars.yaml', 'w') as f:
              for key, value in data.items():
                  f.write(f"{key}: {json.dumps(value)}\n")
          EOF

      - name: Build and deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --source ./backend \
            --region $REGION \
            --project $PROJECT_ID \
            --platform managed \
            --allow-unauthenticated \
            --memory $CLOUD_RUN_MEMORY \
            --timeout 300 \
            --concurrency $CLOUD_RUN_CONCURRENCY \
            --min-instances 0 \
            --max-instances $CLOUD_RUN_MAX_INSTANCES \
            --env-vars-file /tmp/env-vars.yaml

      - name: Register Telegram webhook
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET_TOKEN: ${{ secrets.TELEGRAM_WEBHOOK_SECRET_TOKEN }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          python3 - <<'EOF'
          import hashlib, json, os, subprocess, urllib.request

          bot_token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          if not bot_token:
              print("TELEGRAM_BOT_TOKEN is not set; skipping webhook registration.")
              raise SystemExit(0)

          app_url = os.environ.get("APP_URL", "")
          if not app_url:
              app_url = subprocess.check_output([
                  "gcloud", "run", "services", "describe", os.environ["SERVICE"],
                  "--region", os.environ["REGION"],
                  "--project", os.environ["PROJECT_ID"],
                  "--format", "value(status.url)",
              ], text=True).strip()

          secret_token = os.environ.get("TELEGRAM_WEBHOOK_SECRET_TOKEN", "")
          if not secret_token:
              secret_token = hashlib.sha256(bot_token.encode("utf-8")).hexdigest()

          payload = {
              "url": f"{app_url.rstrip('/')}/bot/webhook",
              "allowed_updates": ["message"],
              "secret_token": secret_token,
          }
          req = urllib.request.Request(
              f"https://api.telegram.org/bot{bot_token}/setWebhook",
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=20) as resp:
              data = json.loads(resp.read().decode("utf-8"))

          if not data.get("ok"):
              raise RuntimeError(f"Telegram rejected webhook registration: {data}")
          print(f"Telegram webhook registered: {payload['url']}")
          EOF

      - name: Print service URL
        run: |
          URL=$(gcloud run services describe $SERVICE --region $REGION --project $PROJECT_ID --format 'value(status.url)')
          echo "Service URL: $URL"
          echo "Set this as the APP_URL GitHub secret if not already done."
          echo "Set this as VITE_API_URL in Vercel."
