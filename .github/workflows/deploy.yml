name: Deploy to Google Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  SERVICE: finance-claims-bot

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --source ./backend \
            --region $REGION \
            --project $PROJECT_ID \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --timeout 300 \
            --set-env-vars "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" \
            --set-env-vars "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" \
            --set-env-vars "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            --set-env-vars "GOOGLE_SERVICE_ACCOUNT_JSON=${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" \
            --set-env-vars "GMAIL_CLIENT_ID=${{ secrets.GMAIL_CLIENT_ID }}" \
            --set-env-vars "GMAIL_CLIENT_SECRET=${{ secrets.GMAIL_CLIENT_SECRET }}" \
            --set-env-vars "GMAIL_REFRESH_TOKEN=${{ secrets.GMAIL_REFRESH_TOKEN }}" \
            --set-env-vars "GOOGLE_DRIVE_PARENT_FOLDER_ID=${{ secrets.GOOGLE_DRIVE_PARENT_FOLDER_ID }}" \
            --set-env-vars "DRIVE_REFRESH_TOKEN=${{ secrets.DRIVE_REFRESH_TOKEN }}" \
            --set-env-vars "R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}" \
            --set-env-vars "R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}" \
            --set-env-vars "R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}" \
            --set-env-vars "R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}" \
            --set-env-vars "FD_NAME=${{ secrets.FD_NAME }}" \
            --set-env-vars "FD_MATRIC_NO=${{ secrets.FD_MATRIC_NO }}" \
            --set-env-vars "FD_PHONE=${{ secrets.FD_PHONE }}" \
            --set-env-vars "ACADEMIC_YEAR=${{ secrets.ACADEMIC_YEAR }}" \
            --set-env-vars "MINI_APP_URL=${{ secrets.MINI_APP_URL }}" \
            --set-env-vars "ALLOWED_ORIGINS=${{ secrets.MINI_APP_URL }}" \
            --set-env-vars "APP_URL=${{ secrets.APP_URL }}"

      - name: Print service URL
        run: |
          URL=$(gcloud run services describe $SERVICE --region $REGION --project $PROJECT_ID --format 'value(status.url)')
          echo "Service URL: $URL"
          echo "Set this as the APP_URL GitHub secret if not already done."
          echo "Set this as VITE_API_URL in Vercel."
