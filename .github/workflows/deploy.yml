name: Deploy to Google Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  SERVICE: finance-claims-bot

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Write env vars file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GOOGLE_DRIVE_PARENT_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_PARENT_FOLDER_ID }}
          DRIVE_REFRESH_TOKEN: ${{ secrets.DRIVE_REFRESH_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          FD_NAME: ${{ secrets.FD_NAME }}
          FD_MATRIC_NO: ${{ secrets.FD_MATRIC_NO }}
          FD_PHONE: ${{ secrets.FD_PHONE }}
          ACADEMIC_YEAR: ${{ secrets.ACADEMIC_YEAR }}
          MINI_APP_URL: ${{ secrets.MINI_APP_URL }}
          APP_URL: ${{ secrets.APP_URL }}
          FD_EMAIL: ${{ secrets.FD_EMAIL }}
        run: |
          python3 - <<'EOF'
          import os, yaml
          keys = [
              'SUPABASE_URL', 'SUPABASE_KEY', 'TELEGRAM_BOT_TOKEN',
              'GOOGLE_SERVICE_ACCOUNT_JSON', 'GMAIL_CLIENT_ID', 'GMAIL_CLIENT_SECRET',
              'GMAIL_REFRESH_TOKEN', 'GOOGLE_DRIVE_PARENT_FOLDER_ID', 'DRIVE_REFRESH_TOKEN',
              'R2_ACCOUNT_ID', 'R2_ACCESS_KEY_ID', 'R2_SECRET_ACCESS_KEY', 'R2_BUCKET_NAME',
              'FD_NAME', 'FD_MATRIC_NO', 'FD_PHONE', 'FD_EMAIL', 'ACADEMIC_YEAR', 'MINI_APP_URL', 'APP_URL',
          ]
          data = {k: os.environ.get(k, '') for k in keys}
          data['ALLOWED_ORIGINS'] = '*'
          with open('/tmp/env-vars.yaml', 'w') as f:
              yaml.dump(data, f, default_flow_style=False, allow_unicode=True, width=float('inf'))
          EOF

      - name: Build and deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --source ./backend \
            --region $REGION \
            --project $PROJECT_ID \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --timeout 300 \
            --concurrency 10 \
            --max-instances 2 \
            --env-vars-file /tmp/env-vars.yaml

      - name: Print service URL
        run: |
          URL=$(gcloud run services describe $SERVICE --region $REGION --project $PROJECT_ID --format 'value(status.url)')
          echo "Service URL: $URL"
          echo "Set this as the APP_URL GitHub secret if not already done."
          echo "Set this as VITE_API_URL in Vercel."
